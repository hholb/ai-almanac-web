name: Frontend CI / Deploy

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

env:
  AR_IMAGE: us-central1-docker.pkg.dev/ai-almanac/almanac/almanac-frontend

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GLOBUS_CLIENT_ID=${{ vars.VITE_GLOBUS_CLIENT_ID }}
            VITE_GLOBUS_REDIRECT_URL=${{ vars.VITE_GLOBUS_REDIRECT_URL }}
          tags: |
            ${{ env.AR_IMAGE }}:latest
            ${{ env.AR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: almanac-frontend
          region: us-central1
          image: ${{ env.AR_IMAGE }}:${{ github.sha }}
