# Model registry
#
# The obs_dir path for each model is resolved at runtime from an env var
# derived from region + id:  {REGION}_{ID}_MODEL_DIR (uppercased, hyphens → underscores)
# Example: region=india id=fuxi → INDIA_FUXI_MODEL_DIR
#
# Models whose env var is unset or empty are excluded from the registry.
#
# The test_fuxi entry uses the small synthetic dataset in testdata/ and is
# excluded in production because TEST_FUXI_TEST_MODEL_DIR is unset.
# See scripts/generate_test_data.py to regenerate testdata if needed.

- id: fuxi_test
  display_name: "FuXi (Test)"
  region: test
  model_type: AIWP
  model_var: tp
  unit_cvt: 1000
  file_pattern: "{}.nc"
  probabilistic: false
  members: null
  init_days: "2,5"
  date_filter_year: 1998
  start_date: "1998-05-01"
  end_date: "2000-07-31"
  start_year_clim: 1998
  end_year_clim: 2000

