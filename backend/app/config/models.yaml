# Model registry
#
# model_dir values are resolved at runtime by substituting the corresponding
# env var from Settings (e.g. india_aifs_model_dir).  Models whose resolved
# model_dir is empty are excluded from the registry automatically.

- id: aifs
  display_name: "AIFS"
  region: india
  model_type: AIWP
  model_dir_setting: india_aifs_model_dir
  model_var: tp
  unit_cvt: 1000
  file_pattern: "{}.nc"
  probabilistic: false
  members: null
  init_days: "0,3"
  date_filter_year: 2013
  start_date: "1964-05-01"
  end_date: "2018-07-31"
  start_year_clim: 1964
  end_year_clim: 2018

