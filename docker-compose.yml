services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: almanac
      POSTGRES_USER: almanac
      POSTGRES_PASSWORD: almanac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almanac -d almanac"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    environment:
      # Override DATABASE_URL so the backend reaches the compose postgres service.
      # All other settings come from backend/.env.
      DATABASE_URL: postgresql+psycopg2://almanac:almanac@db:5432/almanac
      # Synthetic test data for end-to-end smoke testing without real model data.
      DEMO_OBS_DATASETS: "Test Ethiopia=/testdata/ethiopia/obs"
      TEST_FUXI_MODEL_DIR: /testdata/ethiopia/fuxi
      # Map container-internal paths to host paths for Docker-in-Docker volume mounts.
      DOCKER_PATH_MAP: "/app/job_outputs=${PWD}/backend/job_outputs,/app/uploads=${PWD}/backend/uploads,/testdata=${PWD}/testdata"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
      - ./backend/job_outputs:/app/job_outputs
      - ./testdata:/testdata:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    env_file: ./web/.env
    volumes:
      # Mount source for hot reload; node_modules stays in the image.
      - ./web/src:/app/src
      - ./web/static:/app/static
      - ./web/svelte.config.js:/app/svelte.config.js
    ports:
      - "5173:5173"

volumes:
  postgres_data:
